# OS detection for shell and clipboard
if-shell "uname | grep -q Darwin" {
    set -g default-shell /bin/zsh
} {
    set -g default-shell /usr/bin/zsh
    set -g default-command /usr/bin/zsh
}

# Terminal settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",tmux-256color:RGB"
set -g history-limit 5000
set -g allow-passthrough on
set -g focus-events on
set -sg escape-time 10

#Keybinding Changes

# Use C-s (control and s key at the same time) as the prefix key
unbind C-b
set -g prefix C-s
bind C-s send-prefix

bind -T prefix - split-window -v -c '#{pane_current_path}'
bind -T prefix \\ split-window -h -c '#{pane_current_path}'
bind -T prefix h select-pane -L
bind -T prefix j select-pane -D
bind -T prefix k select-pane -U
bind -T prefix l select-pane -R

# vim-tmux-navigator: context-aware pane switching
# Detects vim in the pane and forwards keys to it instead of tmux
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Vim-style copy/paste mode
setw -g mode-keys vi

# Enter copy mode with prefix + [
bind [ copy-mode

# In copy mode: v to begin selection, y to yank (copy)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi Y send-keys -X copy-line

# Clipboard — OSC 52 tunnels through SSH + nested tmux to local clipboard
set -g set-clipboard on
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind ] paste-buffer

# Vim-style scrolling in copy mode
bind -T copy-mode-vi j send-keys -X cursor-down
bind -T copy-mode-vi k send-keys -X cursor-up
bind -T copy-mode-vi h send-keys -X cursor-left
bind -T copy-mode-vi l send-keys -X cursor-right
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-f send-keys -X page-down
bind -T copy-mode-vi C-b send-keys -X page-up
bind -T copy-mode-vi g send-keys -X history-top
bind -T copy-mode-vi G send-keys -X history-bottom

# Mouse support for copy/paste
set -g mouse on
